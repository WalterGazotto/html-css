<!DOCTYPE html>
<html lang="pt-b">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tags</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elemntos da lista a seguir. Passe o mouse  sobre os termos  para descobrir qual tag deverá ultizar em cada caso.</p>
    <br>
    <ul type="square">
        <li><abbr title="Use a tag <p>"> Páragrafo</abbr></li>
        <li><abbr title="Use as tags <h1>.....<h6>"> Títulos</abbr></li>
        <li><abbr title="Use a tag <img>">Imagens</abbr></li>
        <li><abbr title="Use a tag <abbr>">Abreviações</abbr></li>
        <li><abbr title="Use a tag <code>">Códigos-Fonte</abbr></li>
        <li><abbr title="Use as tags <ol> <li>">Listas númeradas</abbr></li>
        <li><abbr title="Use as tags <ul> <li>">Listas com demarcadores</abbr></li>
    </ul>
</body>
</html>
